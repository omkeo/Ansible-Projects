---
- name: Deploy Guess Game Web App
  hosts: localhost
  become: yes
  connection: local

  vars:
    app_dir: /opt/guess-game

  tasks:

    - name: Install Python & pip
      apt:
        name:
          - python3
          - python3-pip
        state: present
        update_cache: yes

    - name: Install Flask
      pip:
        name: flask

    - name: Create app directory
      file:
        path: "{{ app_dir }}/templates"
        state: directory
        mode: '0755'

    - name: Create app.py
      copy:
        dest: "{{ app_dir }}/app.py"
        content: |
          from flask import Flask, render_template, request
          import random

          app = Flask(__name__)
          secret_number = random.randint(1, 5)

          @app.route('/', methods=['GET', 'POST'])
          def home():
              result = ""
              guess = ""

              if request.method == 'POST':
                  guess = int(request.form['guess'])

                  if guess == secret_number:
                      result = "🎉 Correct! You Win!"
                  else:
                      result = f"❌ Wrong! The number was {secret_number}"

              return render_template('index.html', result=result, guess=guess)

          if __name__ == '__main__':
              app.run(host='0.0.0.0', port=5000)

    - name: Create HTML UI
      copy:
        dest: "{{ app_dir }}/templates/index.html"
        content: |
          <!DOCTYPE html>
          <html>
          <head>
              <title>Guess Game</title>
              <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
              <style>
                  body {
                      background: linear-gradient(135deg, #667eea, #764ba2);
                      color: white;
                      text-align: center;
                      font-family: Arial;
                  }
                  .card {
                      margin-top: 100px;
                      padding: 30px;
                      border-radius: 20px;
                      background: rgba(255,255,255,0.1);
                  }
              </style>
          </head>
          <body>
          <div class="container">
              <div class="card col-md-6 offset-md-3">
                  <h2>🎯 Guess the Number (1–5)</h2>
                  <form method="POST">
                      <input type="number" name="guess" class="form-control mt-3" required>
                      <button class="btn btn-warning mt-3 w-100">Submit</button>
                  </form>

                  {% if guess %}
                      <h4 class="mt-3">You guessed: {{ guess }}</h4>
                  {% endif %}

                  {% if result %}
                      <h3 class="mt-3">{{ result }}</h3>
                  {% endif %}
              </div>
          </div>
          </body>
          </html>

    - name: Run Flask App
      shell: |
        nohup python3 {{ app_dir }}/app.py > /dev/null 2>&1 &