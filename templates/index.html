<!DOCTYPE html>
<html>
<head>
    <title>🎮 Guess Game</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            font-family: Arial;
        }

        .card {
            margin-top: 100px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .btn-custom {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
        }

        .btn-custom:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card col-md-6 offset-md-3">

        <h2>🎯 Guess the Number (1–5)</h2>

        <form method="POST">
            <input type="number" name="guess" class="form-control mt-3" placeholder="Enter number" required>

            <button class="btn btn-custom mt-3 w-100">Submit</button>
        </form>

        {% if guess %}
            <h4 class="mt-3">You guessed: {{ guess }}</h4>
        {% endif %}

        {% if result %}
            <h3 class="mt-3">{{ result }}</h3>
        {% endif %}

    </div>
</div>

</body>
</html>
